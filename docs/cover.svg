<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 512" width="1024" height="512">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="60%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <!-- Banana yellow gradient -->
    <linearGradient id="bananaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE135"/>
      <stop offset="60%" stop-color="#F6C90E"/>
      <stop offset="100%" stop-color="#D4A800"/>
    </linearGradient>
    <!-- Banana shadow gradient -->
    <linearGradient id="bananaShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8860B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#B8860B" stop-opacity="0"/>
    </linearGradient>
    <!-- Yellow glow radial gradient -->
    <radialGradient id="glowGrad" cx="38%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#FBBF24" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FBBF24" stop-opacity="0"/>
    </radialGradient>
    <!-- Terminal background -->
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="bananaShadowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Glow filter for banana -->
    <filter id="bananaGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Clip path for rounded corners -->
    <clipPath id="roundedCorners">
      <rect width="1024" height="512" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <!-- Root group with rounded clip -->
  <g clip-path="url(#roundedCorners)">
    <!-- Background -->
    <rect width="1024" height="512" fill="url(#bgGrad)"/>

    <!-- Subtle yellow ambient glow -->
    <rect width="1024" height="512" fill="url(#glowGrad)"/>

    <!-- Subtle grid pattern -->
    <g opacity="0.04" stroke="#FBBF24" stroke-width="0.5">
      <line x1="0" y1="128" x2="1024" y2="128"/>
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="384" x2="1024" y2="384"/>
      <line x1="128" y1="0" x2="128" y2="512"/>
      <line x1="256" y1="0" x2="256" y2="512"/>
      <line x1="384" y1="0" x2="384" y2="512"/>
      <line x1="512" y1="0" x2="512" y2="512"/>
      <line x1="640" y1="0" x2="640" y2="512"/>
      <line x1="768" y1="0" x2="768" y2="512"/>
      <line x1="896" y1="0" x2="896" y2="512"/>
    </g>

    <!-- ===== BANANA ILLUSTRATION (left section) ===== -->
    <!-- Banana glow circle -->
    <circle cx="190" cy="256" r="160" fill="#FBBF24" opacity="0.07"/>

    <!-- Banana main body (crescent/arc shape) -->
    <g filter="url(#bananaShadowFilter)">
      <path d="
        M 100,390
        C 60,350 35,270 55,195
        C 70,135 110,90 158,72
        C 210,52 265,60 300,92
        C 335,124 340,168 320,210
        C 300,250 265,280 240,305
        C 215,330 195,355 175,375
        C 158,392 130,408 100,390 Z
      " fill="url(#bananaGrad)"/>
    </g>

    <!-- Banana inner shadow (adds depth) -->
    <path d="
      M 100,390
      C 60,350 35,270 55,195
      C 70,135 110,90 158,72
      L 165,85
      C 118,102 80,145 67,203
      C 50,272 73,348 110,385 Z
    " fill="url(#bananaShadow)"/>

    <!-- Banana highlight (top surface sheen) -->
    <path d="
      M 165,80
      C 200,65 248,67 285,95
      C 255,72 210,62 165,80 Z
    " fill="rgba(255,255,255,0.35)"/>

    <!-- Banana tip - left (brown bottom tip) -->
    <path d="
      M 100,390
      C 85,400 75,415 80,425
      C 85,430 95,425 100,390 Z
    " fill="#7a5200"/>

    <!-- Banana stem - top right -->
    <path d="
      M 158,72
      C 155,58 160,44 170,38
      C 176,35 180,40 158,72 Z
    " fill="#5a3800"/>

    <!-- Sparkle dots around banana -->
    <circle cx="340" cy="100" r="3" fill="#FBBF24" opacity="0.7"/>
    <circle cx="360" cy="140" r="2" fill="#FBBF24" opacity="0.5"/>
    <circle cx="320" cy="160" r="2.5" fill="#FBBF24" opacity="0.6"/>
    <circle cx="80" cy="180" r="2" fill="#FBBF24" opacity="0.4"/>
    <circle cx="60" cy="300" r="2.5" fill="#FBBF24" opacity="0.5"/>
    <circle cx="105" cy="440" r="2" fill="#FBBF24" opacity="0.4"/>
    <circle cx="200" cy="430" r="3" fill="#FBBF24" opacity="0.6"/>
    <circle cx="280" cy="370" r="2" fill="#FBBF24" opacity="0.4"/>

    <!-- Star sparkles -->
    <!-- Top sparkle -->
    <g transform="translate(355, 75)" opacity="0.8">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#FBBF24" stroke-width="1.5"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#FBBF24" stroke-width="1.5"/>
      <line x1="-7" y1="-7" x2="7" y2="7" stroke="#FBBF24" stroke-width="1"/>
      <line x1="7" y1="-7" x2="-7" y2="7" stroke="#FBBF24" stroke-width="1"/>
    </g>
    <!-- Small sparkle -->
    <g transform="translate(50, 145)" opacity="0.6">
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#FBBF24" stroke-width="1.2"/>
      <line x1="-6" y1="0" x2="6" y2="0" stroke="#FBBF24" stroke-width="1.2"/>
      <line x1="-4" y1="-4" x2="4" y2="4" stroke="#FBBF24" stroke-width="0.8"/>
      <line x1="4" y1="-4" x2="-4" y2="4" stroke="#FBBF24" stroke-width="0.8"/>
    </g>
    <!-- Tiny sparkle -->
    <g transform="translate(315, 390)" opacity="0.5">
      <line x1="0" y1="-5" x2="0" y2="5" stroke="#FBBF24" stroke-width="1"/>
      <line x1="-5" y1="0" x2="5" y2="0" stroke="#FBBF24" stroke-width="1"/>
    </g>

    <!-- ===== VERTICAL SEPARATOR ===== -->
    <line x1="390" y1="60" x2="390" y2="452" stroke="#30363d" stroke-width="1" opacity="0.8"/>

    <!-- ===== TEXT SECTION (right side) ===== -->

    <!-- Main Title: "Nano Banana CLI" -->
    <text
      x="430" y="140"
      font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="62"
      font-weight="700"
      fill="#ffffff"
      letter-spacing="-1"
    >Nano Banana CLI</text>

    <!-- Package name badge background -->
    <rect x="430" y="158" width="324" height="36" rx="6" fill="#FBBF24" opacity="0.12"/>
    <rect x="430" y="158" width="324" height="36" rx="6" fill="none" stroke="#FBBF24" stroke-width="1" opacity="0.3"/>

    <!-- Package name -->
    <text
      x="442" y="183"
      font-family="ui-monospace, 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace"
      font-size="22"
      fill="#FBBF24"
      letter-spacing="0.5"
    >@willh/nanobanana-cli</text>

    <!-- Tagline -->
    <text
      x="430" y="240"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="22"
      fill="#8b949e"
    >Dependency-free Node.js CLI</text>
    <text
      x="430" y="268"
      font-family="ui-sans-serif, system-ui, -apple-system, sans-serif"
      font-size="22"
      fill="#8b949e"
    >for Gemini Nano Banana image workflows</text>

    <!-- Feature pills row -->
    <!-- text-to-image pill -->
    <rect x="430" y="295" width="148" height="28" rx="14" fill="#1f2937"/>
    <text x="504" y="313" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">text-to-image</text>

    <!-- editing pill -->
    <rect x="588" y="295" width="88" height="28" rx="14" fill="#1f2937"/>
    <text x="632" y="313" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">editing</text>

    <!-- composition pill -->
    <rect x="686" y="295" width="124" height="28" rx="14" fill="#1f2937"/>
    <text x="748" y="313" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">composition</text>

    <!-- grounding pill -->
    <rect x="820" y="295" width="114" height="28" rx="14" fill="#1f2937"/>
    <text x="877" y="313" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#58a6ff" text-anchor="middle">grounding</text>

    <!-- ===== TERMINAL CODE BLOCK ===== -->
    <!-- Terminal window background -->
    <rect x="430" y="340" width="560" height="130" rx="10" fill="url(#termGrad)" stroke="#30363d" stroke-width="1"/>

    <!-- Terminal title bar -->
    <rect x="430" y="340" width="560" height="32" rx="10" fill="#21262d"/>
    <rect x="430" y="356" width="560" height="16" fill="#21262d"/>

    <!-- Traffic light dots -->
    <circle cx="454" cy="356" r="6" fill="#ff5f57"/>
    <circle cx="474" cy="356" r="6" fill="#ffbd2e"/>
    <circle cx="494" cy="356" r="6" fill="#28c840"/>

    <!-- Terminal title -->
    <text x="710" y="361" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" fill="#8b949e" text-anchor="middle">nanobanana</text>

    <!-- Terminal content: command line -->
    <!-- Line 1 -->
    <text x="450" y="398" font-family="ui-monospace, 'SFMono-Regular', 'Consolas', monospace" font-size="15" fill="#f0f6fc">
      <tspan fill="#8b949e">$ </tspan><tspan fill="#79c0ff">nanobanana</tspan><tspan fill="#f0f6fc"> \</tspan>
    </text>
    <!-- Line 2 -->
    <text x="450" y="420" font-family="ui-monospace, 'SFMono-Regular', 'Consolas', monospace" font-size="15" fill="#f0f6fc">
      <tspan x="466" fill="#a5d6ff">--prompt</tspan><tspan fill="#f0f6fc"> </tspan><tspan fill="#a8ff78">"Cover art for Nano Banana CLI"</tspan><tspan fill="#f0f6fc"> \</tspan>
    </text>
    <!-- Line 3 -->
    <text x="466" y="442" font-family="ui-monospace, 'SFMono-Regular', 'Consolas', monospace" font-size="15" fill="#f0f6fc">
      <tspan fill="#a5d6ff">--resolution</tspan><tspan fill="#f0f6fc"> </tspan><tspan fill="#ffa657">1K</tspan><tspan fill="#f0f6fc">  </tspan><tspan fill="#a5d6ff">--thinking</tspan><tspan fill="#f0f6fc"> </tspan><tspan fill="#ffa657">high</tspan>
    </text>

    <!-- ===== TOP-RIGHT DECORATIVE SPARKLES ===== -->
    <g opacity="0.5">
      <g transform="translate(950, 60)" opacity="0.9">
        <line x1="0" y1="-12" x2="0" y2="12" stroke="#FBBF24" stroke-width="1.5"/>
        <line x1="-12" y1="0" x2="12" y2="0" stroke="#FBBF24" stroke-width="1.5"/>
        <line x1="-8" y1="-8" x2="8" y2="8" stroke="#FBBF24" stroke-width="1"/>
        <line x1="8" y1="-8" x2="-8" y2="8" stroke="#FBBF24" stroke-width="1"/>
      </g>
      <g transform="translate(990, 95)" opacity="0.6">
        <line x1="0" y1="-7" x2="0" y2="7" stroke="#FBBF24" stroke-width="1.2"/>
        <line x1="-7" y1="0" x2="7" y2="0" stroke="#FBBF24" stroke-width="1.2"/>
      </g>
      <g transform="translate(965, 130)" opacity="0.4">
        <line x1="0" y1="-5" x2="0" y2="5" stroke="#FBBF24" stroke-width="1"/>
        <line x1="-5" y1="0" x2="5" y2="0" stroke="#FBBF24" stroke-width="1"/>
      </g>
      <circle cx="930" cy="95" r="2" fill="#FBBF24" opacity="0.6"/>
      <circle cx="1005" cy="55" r="2.5" fill="#FBBF24" opacity="0.5"/>
      <circle cx="940" cy="145" r="1.5" fill="#FBBF24" opacity="0.4"/>
    </g>

    <!-- ===== BOTTOM BORDER ACCENT ===== -->
    <rect x="0" y="500" width="1024" height="12" fill="url(#bgGrad)"/>
    <rect x="430" y="498" width="560" height="2" rx="1" fill="#FBBF24" opacity="0.4"/>
  </g>
</svg>
