name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Upgrade npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
